apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esmos-ingress
  namespace: production
  annotations:
    # --- Proxy Settings ---
    nginx.ingress.kubernetes.io/proxy-read-timeout: "720"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "8k"

    # --- ModSecurity WAF + OWASP CRS ---
    nginx.ingress.kubernetes.io/enable-modsecurity: "true"
    nginx.ingress.kubernetes.io/enable-owasp-modsecurity-crs: "true"
    nginx.ingress.kubernetes.io/modsecurity-snippet: |
      SecRuleEngine On
      SecRequestBodyAccess On
      SecResponseBodyAccess Off
      SecAuditEngine RelevantOnly
      SecPcreMatchLimit 500000
      SecPcreMatchLimitRecursion 500000
      SecRuleRemoveById 200005
      SecRule REQUEST_URI "@beginsWith /web/database" "id:1000,phase:1,deny,status:403"
      SecRule REQUEST_URI "@contains /etc/passwd" "id:1001,phase:1,deny,status:403"
      SecRule REQUEST_URI "@contains ../" "id:1002,phase:1,deny,status:403"
      SecRule ARGS "@detectXSS" "id:1003,phase:2,deny,status:403"
      SecRule ARGS "@detectSQLi" "id:1004,phase:2,deny,status:403"
      SecRule REQUEST_URI "@contains /proc/self" "id:1005,phase:1,deny,status:403"
      SecRule REQUEST_HEADERS:User-Agent "@contains sqlmap" "id:1006,phase:1,deny,status:403"
      SecRule REQUEST_HEADERS:Host "@contains moodle" "id:1007,phase:1,ctl:ruleRemoveById=941000-949999,ctl:ruleRemoveById=942000-942999,ctl:ruleRemoveById=1003,ctl:ruleRemoveById=1004,nolog"
      SecRule REQUEST_URI "@beginsWith /web/dataset/call_kw" "id:1008,phase:1,ctl:ruleRemoveById=941000-949999,ctl:ruleRemoveById=942000-942999,ctl:ruleRemoveById=1003,ctl:ruleRemoveById=1004,nolog"

    # --- Rate Limiting (20 req/sec per IP, burst 100) ---
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "50"

    # --- HTTPS / TLS ---
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

    # --- Security Headers + Caching ---
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=()" always;
      add_header Cache-Control "public, max-age=1800" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  tls:
    - hosts:
        - esmosmeals.app
        - moodle.esmosmeals.app
      secretName: esmosmeals-tls
  rules:
    - host: esmosmeals.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: odoo
                port:
                  number: 8069
    - host: moodle.esmosmeals.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: moodle
                port:
                  number: 80
