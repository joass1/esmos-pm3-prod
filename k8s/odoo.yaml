apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo
  template:
    metadata:
      labels:
        app: odoo
    spec:
      securityContext:
        fsGroup: 101
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
          command: ["sh", "-c", "mkdir -p /var/lib/odoo/sessions /var/lib/odoo/filestore && chown -R 101:101 /var/lib/odoo && chmod -R 775 /var/lib/odoo"]
          volumeMounts:
            - name: odoo-filestore
              mountPath: /var/lib/odoo
      containers:
        - name: odoo
          image: esmosprodacr.azurecr.io/esmos-odoo:v1
          ports:
            - containerPort: 8069
          env:
            - name: HOST
              value: odoo-db
            - name: PORT
              value: "5432"
            - name: USER
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: POSTGRES_USER
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: odoo-filestore
              mountPath: /var/lib/odoo
      volumes:
        - name: odoo-filestore
          persistentVolumeClaim:
            claimName: odoo-filestore-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: odoo
  namespace: production
spec:
  selector:
    app: odoo
  ports:
    - port: 8069
      targetPort: 8069
