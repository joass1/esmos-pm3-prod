apiVersion: v1
kind: ServiceAccount
metadata:
  name: moodle-cron-sa
  namespace: production
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: moodle-cron-role
  namespace: production
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: moodle-cron-rolebinding
  namespace: production
subjects:
  - kind: ServiceAccount
    name: moodle-cron-sa
    namespace: production
roleRef:
  kind: Role
  name: moodle-cron-role
  apiGroup: rbac.authorization.k8s.io
